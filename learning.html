<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What Is Logan Learning</title>
<link rel="stylesheet" href="styles.css">

<!--
================================================================================
  WHAT IS LOGAN LEARNING  —  a learning-in-public hub
================================================================================

  HOW TO EDIT THIS (the only part you need to touch):
  Scroll down to the SUBJECTS array inside the <script> tag near the bottom.
  Each subject looks like this:

      {
        id: "sociology",              // unique, no spaces
        title: "Sociology",
        why: "One honest line about why you're learning this.",
        lessons: [
          { text: "First thing in the order", done: true },
          { text: "Second thing",             done: false },
          ...
        ]
      }

  - To MARK A LESSON DONE: flip its `done: false` to `done: true`, commit,
    and push. Progress lives in this file, so everyone sees the same thing —
    visitors can't check anything off, and your commit history becomes the
    actual running log.
  - To ADD a subject: copy a whole { ... } block, give it a NEW unique id,
    and fill in your own title / why / lessons.
  - To ADD lessons: add { text: "...", done: false } entries. Order of
    lessons = the order you intend to learn them.
  - When you edit, also update LAST_UPDATED just below the SUBJECTS array
    so the footer stamp stays honest.

  Styling lives in the global stylesheet (styles.css) — the whole site
  shares this page's palette and fonts.
================================================================================
-->
</head>
<body>

  <nav class="nav">
    <a href="/">← Home</a>
    <a href="/about">About Me</a>
    <a href="/services">Services</a>
    <a href="/tools">Tools</a>
    <a href="/thoughts">Thoughts</a>
  </nav>

  <header class="mast">
    <div class="eyebrow">A running log · Logan Schauer</div>
    <h1>What Is Logan <em>Learning</em></h1>
    <p class="lede">Things I'm working through, in the order I mean to work through them. Kept for me first — a way to stay honest about the gap between buying the book and finishing it.</p>

    <div class="tally">
      <span class="count" id="overallCount">0 / 0</span>
      <span class="label">lessons done</span>
    </div>
    <div class="meter"><span id="overallBar"></span></div>
  </header>

  <main class="subjects" id="subjects"></main>

  <footer class="footer split">
    <a href="/">loganschauer.com</a>
    <span id="stamp"></span>
  </footer>

<script>
/* ============================================================================
   EDIT YOUR CURRICULUM HERE — flip done: false → true as you finish lessons
   ========================================================================== */
const SUBJECTS = [
  {
    id: "sociology",
    title: "Sociology",
    why: "The lens I keep reaching for without the vocabulary to name it.",
    lessons: [
      { text: "The sociological imagination — Mills, private trouble vs. public issue", done: false },
      { text: "Durkheim: social facts, solidarity, and anomie", done: false },
      { text: "Marx: class, labor, and alienation", done: false },
      { text: "Weber: bureaucracy, authority, and the Protestant ethic", done: false },
      { text: "Symbolic interactionism — Goffman and the performance of self", done: false },
      { text: "Structure vs. agency — the debate that runs through all of it", done: false },
      { text: "Bourdieu: capital, habitus, and taste", done: false },
      { text: "Applying the lens: read one current event three different ways", done: false }
    ]
  },
  {
    id: "writing",
    title: "Writing",
    why: "I want to write the way I talk when it's real — not looser, not stiffer.",
    lessons: [
      { text: "Write the bad draft on purpose — finish one, don't fix it yet", done: false },
      { text: "Find the one-sentence point after the draft, not before", done: false },
      { text: "Edit pass 1 — cut: delete anything not serving the point", done: false },
      { text: "Edit pass 2 — order: does each paragraph earn the next?", done: false },
      { text: "Edit pass 3 — voice: read aloud, plain down the 'writing'", done: false },
      { text: "Write to one person, named or unnamed, every time", done: false },
      { text: "Ship one piece publicly and survive it", done: false }
    ]
  },
  {
    id: "specialty-coffee",
    title: "Specialty Coffee",
    why: "Fourth-wave knowledge I have by feel — worth making explicit.",
    lessons: [
      { text: "Origin & terroir — why the same varietal tastes like the place", done: false },
      { text: "Processing: washed, natural, honey, and what each does to the cup", done: false },
      { text: "Roast development and the Maillard vs. caramelization line", done: false },
      { text: "Extraction theory — the brewing control chart", done: false },
      { text: "Dialing in espresso: dose, yield, time, and taste", done: false },
      { text: "Cupping protocol and building a tasting vocabulary", done: false }
    ]
  }
];

/* Update this when you edit the list above — it's the footer stamp. */
const LAST_UPDATED = "jul 2026";

/* ============================================================================
   ENGINE — you shouldn't need to touch anything below this line.
   Read-only: progress is baked into the data above, so visitors see your
   real progress and can't check anything off.
   ========================================================================== */
const CHECK_SVG = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M2.5 6.2l2.3 2.3L9.6 3.5" stroke="#F6F1E6" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const CHEV_SVG  = '<svg class="chev" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function pad(n){ return String(n).padStart(2,"0"); }

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

function render(){
  const root = document.getElementById("subjects");
  let grandDone = 0, grandTotal = 0;

  SUBJECTS.forEach((sub, i) => {
    const done = sub.lessons.filter(l => l.done).length;
    const total = sub.lessons.length;
    grandDone += done; grandTotal += total;
    const pct = total ? Math.round((done/total)*100) : 0;
    const complete = total > 0 && done === total;

    const card = document.createElement("section");
    card.className = "subject" + (complete ? " done" : "");
    card.dataset.id = sub.id;

    // ----- header (click to expand) -----
    const head = document.createElement("div");
    head.className = "subject-head";
    head.setAttribute("role","button");
    head.setAttribute("tabindex","0");
    head.setAttribute("aria-expanded","false");
    head.innerHTML = `
      <div class="catalog">No.${pad(i+1)}</div>
      <div class="subject-body">
        <div class="subject-title">${escapeHtml(sub.title)}</div>
        ${sub.why ? `<div class="subject-why">${escapeHtml(sub.why)}</div>` : ""}
        <div class="subject-meta">
          <div class="mini-meter"><span style="width:${pct}%"></span></div>
          <div class="frac">${done}/${total}${complete ? " · done" : ""}</div>
        </div>
      </div>
      ${CHEV_SVG}
    `;

    // ----- lessons (read-only) -----
    const lessonsWrap = document.createElement("div");
    lessonsWrap.className = "lessons";
    const inner = document.createElement("div");
    inner.className = "lessons-inner";
    const ul = document.createElement("ul");
    ul.className = "lesson-list";

    sub.lessons.forEach((lesson, j) => {
      const li = document.createElement("li");
      li.className = "lesson" + (lesson.done ? " checked" : "");
      li.innerHTML = `
        <span class="box">${CHECK_SVG}</span>
        <span class="lesson-idx">${pad(j+1)}</span>
        <span class="lesson-text">${escapeHtml(lesson.text)}${lesson.done ? '<span class="sr-only"> (done)</span>' : ""}</span>
      `;
      ul.appendChild(li);
    });

    inner.appendChild(ul);
    lessonsWrap.appendChild(inner);

    const expand = () => {
      const isOpen = card.classList.toggle("open");
      head.setAttribute("aria-expanded", isOpen ? "true" : "false");
    };
    head.addEventListener("click", expand);
    head.addEventListener("keydown", (e)=>{
      if(e.key === "Enter" || e.key === " "){ e.preventDefault(); expand(); }
    });

    card.appendChild(head);
    card.appendChild(lessonsWrap);
    root.appendChild(card);
  });

  // overall
  const overallPct = grandTotal ? Math.round((grandDone/grandTotal)*100) : 0;
  document.getElementById("overallCount").textContent = grandDone + " / " + grandTotal;
  requestAnimationFrame(()=>{ document.getElementById("overallBar").style.width = overallPct + "%"; });
}

document.getElementById("stamp").textContent = "updated " + LAST_UPDATED;

render();
</script>
</body>
</html>
